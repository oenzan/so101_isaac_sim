# joint_limits_dual.yaml - Çift kol için uyarlanmış limitler

# Güvenlik için hız ve ivme ölçeklemesi (0.1 = %10 hız)
default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

